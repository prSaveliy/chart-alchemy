name: Testing CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.2
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3000
      JWT_SECRET: jwt-secret-test
      DATABASE_URL: postgresql://user:password@localhost:5432/testdb?schema=public
      API_URL: http://localhost:3000
      CLIENT_API_URL: http://localhost:5173
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: test@example.com
      SMTP_PASSWORD: dummy
      OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
      OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
      GOOGLE_GENAI_USE_VERTEXAI: ${{ secrets.GOOGLE_GENAI_USE_VERTEXAI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Write backend/.env.test
        working-directory: backend
        run: |
          cat > .env.test <<EOF
          NODE_ENV=$NODE_ENV
          PORT=$PORT
          JWT_SECRET=$JWT_SECRET
          DATABASE_URL=$DATABASE_URL
          API_URL=$API_URL
          CLIENT_API_URL=$CLIENT_API_URL
          SMTP_HOST=$SMTP_HOST
          SMTP_PORT=$SMTP_PORT
          SMTP_USER=$SMTP_USER
          SMTP_PASSWORD=$SMTP_PASSWORD
          OAUTH_GOOGLE_CLIENT_ID=$OAUTH_GOOGLE_CLIENT_ID
          OAUTH_GOOGLE_CLIENT_SECRET=$OAUTH_GOOGLE_CLIENT_SECRET
          GOOGLE_CLOUD_PROJECT=$GOOGLE_CLOUD_PROJECT
          GOOGLE_CLOUD_LOCATION=$GOOGLE_CLOUD_LOCATION
          GOOGLE_GENAI_USE_VERTEXAI=$GOOGLE_GENAI_USE_VERTEXAI
          EOF
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Test
        run: npm test
